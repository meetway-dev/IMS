services:
  db:
    image: postgres:17
    container_name: ims-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims
    ports:
      - "5433:5432"
    volumes:
      - ims_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ims"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ims_db_data:
